# Source of truth for the existing Cloudflare Pages project.
name = "seba-treasure-hunt"
pages_build_output_dir = "./dist"
compatibility_date = "2026-07-11"

[vars]
DEPLOYMENT_ENV = "production"
AUTHORIZED_PARTY = "https://www.timlostsomething.com,https://seba-treasure-hunt.pages.dev"
TURNSTILE_ALLOWED_HOSTS = "www.timlostsomething.com,seba-treasure-hunt.pages.dev"
CAMPAIGN_BASE_URL = "https://www.timlostsomething.com"
HUNTER_ACCOUNT_PORTAL_URL = "https://www.timlostsomething.com/dashboard"
STAFF_ACCOUNT_PORTAL_URL = "https://www.timlostsomething.com/ops"
STAFF_INVITATION_REDIRECT_URL = "https://www.timlostsomething.com/ops"

[[d1_databases]]
binding = "DB"
database_name = "tim-lost-hunter-platform"
database_id = "6cd93ca6-7a4b-46eb-bfb3-e71040f405d7"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "tim-lost-private-media"

[[queues.producers]]
binding = "MEDIA_QUEUE"
queue = "tim-lost-media-processing"

[env.preview.vars]
DEPLOYMENT_ENV = "validation"
AUTHORIZED_PARTY = "https://codex-validation.seba-treasure-hunt.pages.dev"
TURNSTILE_ALLOWED_HOSTS = "codex-validation.seba-treasure-hunt.pages.dev"
CAMPAIGN_BASE_URL = "https://codex-validation.seba-treasure-hunt.pages.dev"
HUNTER_ACCOUNT_PORTAL_URL = "https://codex-validation.seba-treasure-hunt.pages.dev/dashboard"
STAFF_ACCOUNT_PORTAL_URL = "https://codex-validation.seba-treasure-hunt.pages.dev/ops"
STAFF_INVITATION_REDIRECT_URL = "https://codex-validation.seba-treasure-hunt.pages.dev/ops"
TRANSACTIONAL_EMAIL_PROVIDER = "microsoft_graph"
GRAPH_CLIENT_ID = "0f2c008f-40db-496e-a37b-a86aa0dadc9f"
GRAPH_TENANT_ID = "ca4189c0-b72f-4f39-aecc-b44bcaa5b3f7"
GRAPH_TOKEN_KEY_VERSION = "validation-2026-07-15-v1"
TRANSACTIONAL_EMAIL_FROM_ADDRESS = "tech@sebahub.com"
TRANSACTIONAL_EMAIL_FROM_NAME = "Tim Lost Something?"
TRANSACTIONAL_EMAIL_REPLY_TO = "casey@sebahub.com"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "tim-lost-hunter-platform-validation"
database_id = "2ad5e924-39df-48ce-aec8-d3029b7a4abf"

[[env.preview.r2_buckets]]
binding = "UPLOADS"
bucket_name = "tim-lost-private-media-validation"

[[env.preview.queues.producers]]
binding = "MEDIA_QUEUE"
queue = "tim-lost-media-processing-validation"
